version: "3.2"
services:
  web:
    image: "registry.thinklabs.com.vn:5000/daihathanh-home:latest"
    deploy:
      replicas: 1
      placement:
        constraints: [ node.hostname==k8sbiai1 ]
      restart_policy:
        condition: any
    environment:
      PORT: 80
      NODE_ENV: "production"
      SERVICE_80_NAME: "daihathanh-home"
      SERVICE_NAME: "daihathanh-home"
      SERVICE_TAGS: "daihathanh-home"
    ports:
      - target: 80
        published: 8068
        mode: host
    volumes:
      - upload:/app/upload

volumes:
  upload:
    driver: local
